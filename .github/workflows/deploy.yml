name: Java 21 Spring & React CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker Deploy
        # 이 명령어가 실행되면 Dockerfile 내부의 빌드 로직이 작동합니다.
        run: |
          docker-compose up -d --build
          docker image prune -f