name: Java 21 Spring & React CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker Deploy
        run: |
          # 빌드와 배포를 Docker에게 전부 위임
          docker-compose up -d --build
          docker image prune -f