name: Java 21 Spring & React CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker Deploy
        # 모든 빌드 로직은 Dockerfile이 처리합니다.
        run: |
          docker-compose up -d --build
          docker image prune -f