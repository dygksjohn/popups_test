name: Java 21 Spring & React CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted # 내 VM에서 실행

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Backend (Java 21)
        run: |
          chmod +x ./gradlew
          ./gradlew build -x test

      - name: Build Frontend (React)
        run: |
          cd frontend
          npm install
          npm run build

      - name: Docker Deploy
        run: |
          docker-compose up -d --build
          docker image prune -f # 오래된 이미지 정리